apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        # JSON logs from slog: "trace_id":"<32 hex chars>"
        - name: trace_id
          matcherRegex: '"trace_id":"([a-fA-F0-9]{32})"'
          url: '$${__value.raw}'
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        customQuery: true
        # Match trace id anywhere in the log line (JSON body), same as copy/paste into Explore.
        query: '{job="backend"} |~ "$${__span.traceId}"'
